# destination|source_glob|target_name
# destination accepts home, ~/..., absolute paths, or repo-relative paths.
# source_glob is relative to this repo unless absolute. Globs include dotfiles.
# target_name is optional and is only valid when source_glob matches one file.
home|symlinked_to_home/*
~/.config|symlinked_to_config/*
~/.config/claude|config_files/claude/*
~/.config/gh|config_files/gh/*
~/.config/karabiner|config_files/karabiner/*
~/.config/lazygit|config_files/lazygit/*
~/.claude|config_files/claude/*
~/.codex|agent_instructions/AGENTS.md
~/.claude|agent_instructions/AGENTS.md|CLAUDE.md
~/Library/Application Support/lazygit|config_files/lazygit/*
~/Library/Application Support/espanso/match|symlinked_to_espanso/*
